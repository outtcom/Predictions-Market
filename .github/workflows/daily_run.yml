name: Daily Trading Run

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
      KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
      KALSHI_API_SECRET: ${{ secrets.KALSHI_API_SECRET }}
      KALSHI_EMAIL: ${{ secrets.KALSHI_EMAIL }}
      KALSHI_PASSWORD: ${{ secrets.KALSHI_PASSWORD }}
      METACULUS_API_KEY: ${{ secrets.METACULUS_API_KEY }}
      GOODJUDGMENT_API_KEY: ${{ secrets.GOODJUDGMENT_API_KEY }}
      MANIFOLD_API_KEY: ${{ secrets.MANIFOLD_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
      ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
      BANKROLL_USD: ${{ secrets.BANKROLL_USD }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      MODE: paper

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e .

      - name: Run trading cycle
        run: python main.py --mode paper --max-pages 2

      - name: Regenerate dashboard
        run: python scripts/generate_static_dashboard.py

      - name: Commit and push dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update dashboard [auto]"
          git push

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🔴 Daily trading run FAILED. Check GitHub Actions: https://github.com/outtcom/Predictions-Market/actions"
